<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Rat Maze Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Visualization Area -->
        <main class="visualization-area">
            <div class="canvas-wrapper">
                <!-- Layers for different views -->
                <canvas id="mazeCanvas" width="1000" height="940"></canvas>
            </div>
        </main>

        <!-- Sidebar Panel -->
        <aside class="sidebar">
            <div class="glass-panel">
                <h1 class="app-title">A* Rat Maze</h1>
                <div class="mode-toggle">
                    <div class="toggle-group">
                        <span class="mode-label">Jerry View</span>
                        <label class="switch">
                            <input type="checkbox" id="viewToggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="toggle-group">
                        <span class="mode-label">Heuristic</span>
                        <label class="switch">
                            <input type="checkbox" id="heuristicToggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <div class="info-group">
                    <div id="metricsPanel" class="metrics-panel">
                        <p><strong>Current node:</strong> <span id="currentNodeDisplay">-</span></p>
                        <div class="metric-row"><span class="metric-label">g(n):</span> <span id="gScoreDisplay">0</span></div>
                        <div class="metric-row"><span class="metric-label">h(n):</span> <span id="hScoreDisplay">0</span></div>
                        <div class="metric-row"><span class="metric-label">f(n):</span> <span id="fScoreDisplay">0</span></div>
                        <div class="comparison-panel">
                            <div class="comparison-title">Comparisons</div>
                            <div id="comparisonList" class="comparison-list"></div>
                        </div>
                    </div>
                </div>

                <div class="actions-group">
                    <div class="speed-control">
                        <label for="speedSlider" class="speed-label">Speed:</label>
                        <input type="range" id="speedSlider" class="speed-slider" min="50" max="2000" value="450" step="50">
                        <span id="speedDisplay" class="speed-value">450ms</span>
                    </div>
                    <button id="btnRunAstar" class="primary-btn">Run A* Search</button>
                    <button id="btnReset" class="secondary-btn">Reset</button>
                </div>

                <div class="controls-group">
                    <div class="d-pad">
                        <button id="btnUp" class="d-pad-btn up">▲</button>
                        <button id="btnLeft" class="d-pad-btn left">◀</button>
                        <button id="btnRight" class="d-pad-btn right">▶</button>
                        <button id="btnDown" class="d-pad-btn down">▼</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Hidden images for Canvas drawing -->
    <div style="display: none;">
        <img id="imgMazeOutline" src="assets/maze-outline.png">
        <img id="imgJerryRight" src="assets/jerry_rat_right.png">
        <img id="imgJerryLeft" src="assets/jerry_rat_left.png">
        <img id="imgTom" src="assets/tom_goal.png">
        <img id="imgHeuristic" src="assets/heuristic_path.png">
        <img id="imgPath" src="assets/path.jpg">
        <img id="imgEnd" src="assets/end.png">
    </div>

    <script src="data.js"></script>
    <script src="state.js"></script>
    <script src="movement.js"></script>
    <script src="astar.js"></script>
    <script src="info.js"></script>
    <script src="draw.js"></script>
    <script src="init.js"></script>
</body>
</html>
